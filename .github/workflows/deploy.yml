name: Deploy Website via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        timeout: 60000
        server-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          README.md
          **/.antigravity/**
          **/skills/**
          **/run-watcher.bat
          **/desktop.ini
          package.json
          package-lock.json
          tailwind.config.js
          scripts/**
          css/input.css
          **/*.jpg
          **/*.png
          !**/Logo 1.jpg
          !**/Logo.png
          !**/casas-steel-framing/hero.png
